<!DOCTYPE html>
<html lang="en">
    <head>
        <title> Registration Form </title>
    </head>
    <body>
        <h2 align="center">Student Registration Form</h2>
        <div style ="width:500px; border:1px solid black; margin:20px auto;padding: 10px">
        <form>
            <label> UserName :</label><br>
            <input type="text" name="username" placeholder="Enter Username" required><br><br>

            <label> Age: </label><br>
            <input type="number" name="age" min="1" max="100" required><br><br>

            <label> Email: </label><br>
            <input type="email" name="email" placeholder="Enter Email" required><br><br>

            <label> Contact Number: </label><br>
            <input type="tel" name="phone" placeholder="Enter Mobile Number" pattern="[0-9]{10}" required><br><br>

            <label>Password: </label><br>
            <input type="password" name="password" required><br><br>

            <label>Gender: </label><br>
            <input type="radio" name="gender" value="Male"> Male
            <input type="radio" name="gender" value="Female"> Female
            <input type="radio" name="gender" value="Other"> Other
            <br><br>

            <label>Date of Birth: </label><br>
            <input type="date" name="dob"><br><br>

            <label>Address: </label><br>
            <textarea name="address" rows="4" cols="30" placeholder="Enter Address"></textarea><br><br>

            <label>Course:</label><br>
            <select name="course">
                <option>Select Course</option>
                <option>B.Tech</option>
                <option>B.Sc</option>
                <option>B.Com</option>
                <option>MCA</option>
                <option>M.Tech</option>
            </select>
            <br><br>

            <input type="submit" value="Register">
            <input type="reset" value="Clear">
        </form>
        </div>
    </body>
</html>
